name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ElBruno.NetAgent.sln

      - name: Build
        run: dotnet build ElBruno.NetAgent.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test ElBruno.NetAgent.sln --configuration Release --no-build --verbosity normal
