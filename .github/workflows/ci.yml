name: CI - Packaging Validation (No Publish)
# Phase 13: CI validates restore, build, test, pack, and runs local package smoke test.
# This workflow does NOT publish to NuGet and does NOT execute the application.
# No secrets are required.

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  packaging:
    name: CI Packaging Validation
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ElBruno.NetAgent.sln

      - name: Build
        run: dotnet build ElBruno.NetAgent.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test ElBruno.NetAgent.sln --configuration Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack src/ElBruno.NetAgent/ElBruno.NetAgent.csproj --configuration Release --no-build --output artifacts/packages

      - name: Run local package smoke test
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File ./scripts/smoke-test-local-package.ps1 -Package ./artifacts/packages/ElBruno.NetAgent.0.1.0.nupkg

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: artifacts/packages/*.nupkg
          retention-days: 7
